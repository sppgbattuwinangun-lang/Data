<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPPG Batuwinangun - Sistem Pelaporan Distribusi MBG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="bg-blobs"></div>

<!-- ============================================
     LOGIN SCREEN
     ============================================ -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">SP</div>
    <h1>SPPG Batuwinangun</h1>
    <p class="sub">Sistem Pelaporan Distribusi Makan Bergizi Gratis</p>
    <form id="loginForm" class="login-form" autocomplete="off">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <input id="loginUsername" class="input" type="text" placeholder="Masukkan username" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" class="input" type="password" placeholder="Masukkan password" autocomplete="current-password" required />
      </div>
      <div id="loginError" class="text-sm" style="color: var(--danger); display:none;"></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">
        Masuk ke Sistem
      </button>
      <p class="text-xs muted center" style="margin-top: 12px;">
        Hubungi administrator jika Anda lupa kredensial
      </p>
    </form>
  </div>
</div>

<!-- ============================================
     APP SHELL (hidden until login)
     ============================================ -->
<div id="appShell" class="app hidden">

  <!-- Mobile menu button -->
  <button class="menu-toggle" id="menuToggle" aria-label="Menu">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
  </button>

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div class="brand-logo">SP</div>
      <div>
        <div class="brand-name">SPPG Batuwinangun</div>
        <div class="brand-sub">Pelaporan MBG</div>
      </div>
    </div>

    <nav class="nav">
      <button class="nav-item active" data-page="dashboard">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <button class="nav-item" data-page="entry">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Input Laporan Harian
      </button>
      <button class="nav-item" data-page="history">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>
        Riwayat Laporan
      </button>
      <button class="nav-item" data-page="export">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
        Export PDF Range
      </button>
      <button class="nav-item" data-page="settings">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Pengaturan
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="nav-item" id="themeToggle">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <span id="themeLabel">Mode Gelap</span>
      </button>
      <div class="user-pill">
        <div class="user-avatar" id="userAvatar">A</div>
        <div style="flex:1; min-width:0;">
          <div style="font-weight:600; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" id="userName">admin</div>
          <div class="text-xs muted" id="userRole">Administrator</div>
        </div>
        <button class="btn btn-ghost btn-icon" id="logoutBtn" title="Logout">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="main">
    <!-- Pages will be rendered here by app.js -->
    <div id="pageContent"></div>
  </main>
</div>

<!-- Toast container -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- Modal container -->
<div id="modalRoot"></div>

<!-- Hidden PDF render zone -->
<div class="pdf-render" id="pdfRender"></div>

<!-- Global loading overlay -->
<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="loading-card">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loadingText">Memproses...</div>
    <div class="loading-sub" id="loadingSub"></div>
    <div class="loading-progress hidden" id="loadingProgress">
      <div class="loading-progress-bar" id="loadingProgressBar"></div>
    </div>
  </div>
</div>

<!-- App scripts -->
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
